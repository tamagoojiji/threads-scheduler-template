<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAuth認可完了｜スレッズスケジューラー</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; max-width: 760px; margin: 0 auto; padding: 32px 20px; line-height: 1.8; color: #222; text-align: center; }
  h1 { font-size: 1.8em; color: #0a8a0a; }
  .code-box { background: #f0f0f0; padding: 20px; border-radius: 8px; margin: 2em 0; word-break: break-all; text-align: left; font-family: "SF Mono", Consolas, monospace; }
  .notice { background: #fff4c4; padding: 16px 20px; border-radius: 6px; margin: 1em 0; text-align: left; }
  button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
  button:hover { background: #0052a3; }
  .error { color: #c00; }
  footer { margin-top: 3em; padding-top: 1em; border-top: 1px solid #ddd; color: #666; font-size: 0.85em; }
</style>
</head>
<body>
<h1>✓ 認可コードを受信しました</h1>

<p>Threadsからの認可コードを受信しました。以下のコードをtamagoさん（セットアップ担当者）のZoom画面に共有してください。</p>

<div id="code-display" class="code-box">
<div id="code-value">（コードを取得中...）</div>
</div>

<button onclick="copyCode()">コードをコピー</button>

<div class="notice">
<strong>⚠️ このコードは一時的なものです</strong><br>
セットアップ担当者がこのコードを用いて長期アクセストークンに変換します。このページは閉じても構いません。
</div>

<div id="error-display" class="error" style="display:none;"></div>

<footer>
© 2026 @tamago_app. All rights reserved.<br>
<a href="./">トップ</a> | <a href="./privacy-policy.html">プライバシーポリシー</a>
</footer>

<script>
  // URLから code パラメータを抽出
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  const error = urlParams.get('error');
  const errorDescription = urlParams.get('error_description');

  const codeDisplay = document.getElementById('code-value');
  const errorDisplay = document.getElementById('error-display');

  if (error) {
    codeDisplay.textContent = '（エラー発生）';
    errorDisplay.textContent = `エラー: ${error} - ${errorDescription || ''}`;
    errorDisplay.style.display = 'block';
  } else if (code) {
    codeDisplay.textContent = code;
  } else {
    codeDisplay.textContent = '（コードが見つかりません。認可URLを再度開いてください）';
  }

  function copyCode() {
    const text = codeDisplay.textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        alert('コードをコピーしました');
      });
    } else {
      // fallback
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      alert('コードをコピーしました');
    }
  }
</script>
</body>
</html>
