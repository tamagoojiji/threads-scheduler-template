name: refresh

on:
  schedule:
    - cron: '0 0 * * 0'   # 毎週日曜 00:00 UTC（日本時間9:00）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Refresh Threads long-lived token
        id: refresh
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          NEW_TOKEN=$(npm run --silent refresh-token 2>refresh.log)
          if [ -z "$NEW_TOKEN" ]; then
            echo "::error::Token refresh returned empty"
            cat refresh.log
            exit 1
          fi
          echo "::add-mask::$NEW_TOKEN"
          echo "new_token=$NEW_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update GitHub Secret (THREADS_ACCESS_TOKEN)
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_SECRETS }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAT_FOR_SECRETS が未登録です。setup-guide の Step 9-X を参照してPATを登録してください。"
            exit 1
          fi
          printf '%s' '${{ steps.refresh.outputs.new_token }}' | gh secret set THREADS_ACCESS_TOKEN --repo "$GITHUB_REPOSITORY"

      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"content":"✅ Threadsトークンを自動更新しました（次回 +60日有効）"}' \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"content":"⚠️ Threadsトークン自動更新失敗。Actionsログを確認してください。"}' \
            "$DISCORD_WEBHOOK_URL"
