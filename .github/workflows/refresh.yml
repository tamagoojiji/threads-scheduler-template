name: refresh

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Refresh Threads token
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          npm run refresh-token > refresh_output.txt 2>&1 || {
            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"⚠️ Threadsトークン更新失敗。手動で確認してください。\"}" \
              $DISCORD_WEBHOOK_URL
            cat refresh_output.txt
            exit 1
          }
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"✅ Threadsトークン更新成功。GitHub Secretsに新しい値を登録してください。Actionsログを確認。\"}" \
            $DISCORD_WEBHOOK_URL
