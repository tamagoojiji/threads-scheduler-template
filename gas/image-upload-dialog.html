<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; margin: 0; color: #222; }
    h2 { margin: 0 0 8px; font-size: 16px; }
    .desc { font-size: 13px; color: #555; margin: 0 0 14px; }
    input[type=file] { display: block; margin: 12px 0; font-size: 13px; }
    .preview { max-width: 100%; max-height: 120px; margin: 8px 0; border-radius: 6px; display: none; }
    button { padding: 8px 18px; font-size: 14px; cursor: pointer; background: #6a11cb; color: #fff; border: none; border-radius: 4px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; min-height: 18px; }
    #status.error { color: #d32f2f; }
    #status.success { color: #2e7d32; }
    .hint { color: #888; font-size: 12px; margin-top: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <h2>📷 画像をアップロード</h2>
  <p class="desc">JPEG / PNG / WebP（8MBまで）</p>
  <input type="file" id="file" accept="image/jpeg,image/png,image/webp">
  <img id="preview" class="preview" alt="preview">
  <button id="upload" disabled>アップロード</button>
  <div id="status"></div>
  <p class="hint">完了後、選択中のセルにGitHub PagesのURLが自動入力されます。<br>反映までGitHub側で1〜2分かかる場合があります。</p>

  <script>
    var fileInput = document.getElementById('file');
    var preview = document.getElementById('preview');
    var btn = document.getElementById('upload');
    var status = document.getElementById('status');

    fileInput.addEventListener('change', function () {
      status.textContent = '';
      status.className = '';
      var file = fileInput.files[0];
      if (!file) {
        btn.disabled = true;
        preview.style.display = 'none';
        return;
      }
      btn.disabled = false;
      var url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = 'block';
    });

    btn.addEventListener('click', function () {
      var file = fileInput.files[0];
      if (!file) return;
      if (file.size > 8 * 1024 * 1024) {
        status.textContent = '⚠️ 8MBを超えています';
        status.className = 'error';
        return;
      }
      btn.disabled = true;
      status.textContent = 'アップロード中...';
      status.className = '';

      var reader = new FileReader();
      reader.onload = function (e) {
        var base64 = e.target.result.split(',')[1];
        google.script.run
          .withSuccessHandler(function (res) {
            status.textContent = '✅ 完了: ' + res.url;
            status.className = 'success';
            setTimeout(function () {
              google.script.host.close();
            }, 1800);
          })
          .withFailureHandler(function (err) {
            status.textContent = '❌ ' + (err.message || err);
            status.className = 'error';
            btn.disabled = false;
          })
          .uploadImageFromDialog({
            filename: file.name,
            contentType: file.type,
            base64: base64,
          });
      };
      reader.onerror = function () {
        status.textContent = '❌ ファイル読込失敗';
        status.className = 'error';
        btn.disabled = false;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
